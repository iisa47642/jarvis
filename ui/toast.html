<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  /* колонка карточек, прижата к низу; высота = контент (НЕ inset:0).
     inset:0 + justify-content:flex-end ломал измерение: при переполнении
     карточки уходят вверх за край, а scrollHeight верхний оверфлоу не видит —
     окно недомеряло высоту и обрезало верхние карточки. bottom:0 + auto-высота
     даёт корректный scrollHeight. */
  .stack {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 16px 12px 6px;
  }
  /* пилюля в духе Wispr Flow: глухой тёмный фон, крупный радиус */
  .card {
    padding: 13px 16px 14px 18px;
    border-radius: 20px;
    background: rgba(8, 8, 10, 0.97);
    backdrop-filter: blur(60px) saturate(180%);
    -webkit-backdrop-filter: blur(60px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.09);
    cursor: default;
    opacity: 0;
    transform: translateY(26px) scale(0.96);
    transition: opacity 220ms cubic-bezier(0.21, 1.02, 0.55, 1),
                transform 260ms cubic-bezier(0.21, 1.27, 0.45, 1); /* лёгкий овершут */
  }
  .card.in { opacity: 1; transform: translateY(0) scale(1); }
  .card.out {
    opacity: 0;
    transform: translateY(14px) scale(0.97);
    transition: opacity 170ms ease-in, transform 170ms ease-in;
  }
  /* подсветка рамки — только у карточки под курсором (:hover — когда апп
     активен; .hot — из нативного поллинга, когда активно чужое приложение).
     .paused (весь стек) рамку НЕ трогает — иначе не видно, где курсор. */
  .card:hover, .card.hot { border-color: rgba(255, 255, 255, 0.18); }

  .crow { display: flex; align-items: center; gap: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #41c98e; flex: none; }
  .dot.waiting { background: #f2a33c; }
  .dot.limit { background: #8b7ec8; }
  .title {
    font-size: 14px;
    font-weight: 600;
    color: #f0f0f2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .close {
    appearance: none;
    position: relative;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: #d9d9de;
    font-size: 12px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
    flex: none;
  }
  .close:hover, .card.hot .close { background: rgba(255, 255, 255, 0.1); }

  /* кольцо-таймер: стекает за TTL, на ховере карточки замирает (как таймер) */
  .ring {
    position: absolute;
    inset: 0;
    transform: rotate(-90deg);
    pointer-events: none;
  }
  .ring circle { fill: none; stroke-width: 2.5; }
  .ring .track { stroke: rgba(255, 255, 255, 0.16); }
  .ring .fg {
    stroke: #d9d9de;
    stroke-linecap: round;
    stroke-dasharray: 72.3; /* 2π·11.5 */
    stroke-dashoffset: 0;
    animation: ringDrain var(--ttl, 8000ms) linear forwards;
  }
  @keyframes ringDrain { to { stroke-dashoffset: 72.3; } }
  /* пауза кольца: :hover работает, когда приложение активно; .paused — из
     нативного poll'а курсора (когда активно другое приложение) */
  .card:hover .ring .fg,
  .card.paused .ring .fg { animation-play-state: paused; }

  .body {
    font-size: 12.5px;
    line-height: 1.45;
    color: #9a9aa2;
    display: -webkit-box;
    -webkit-line-clamp: 6; /* ИИ-выжимка ответа — до шести строк (короткий текст влезает целиком) */
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin: 7px 36px 0 18px;
  }
  .cont {
    appearance: none; cursor: default;
    margin: 9px 18px 2px; padding: 5px 12px;
    border: 1px solid rgba(108, 160, 255, 0.45); border-radius: 7px;
    background: rgba(108, 160, 255, 0.14); color: #cfe0ff;
    font: inherit; font-size: 12px; font-weight: 600;
    transition: background 120ms ease;
  }
  .cont:hover { background: rgba(108, 160, 255, 0.24); }

  /* варианты вопроса (AskUserQuestion): номерной чип + label + описание.
     Выбор — глобальным хоткеем ⌘⌥1..9 (или кликом). */
  .opts { margin: 9px 16px 2px 18px; display: flex; flex-direction: column; gap: 5px; }
  .opt {
    display: flex; gap: 9px; align-items: flex-start;
    padding: 6px 8px; border-radius: 9px;
    border: 1px solid transparent;
    cursor: default;
    transition: background 110ms ease, border-color 110ms ease;
  }
  .opt:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.12); }
  .opt .num {
    flex: none; font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px; color: #cfe0ff;
    min-width: 19px; height: 19px; padding: 0 3px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(108, 160, 255, 0.4); border-radius: 5px;
    background: rgba(108, 160, 255, 0.12);
  }
  .opt .otext { min-width: 0; flex: 1; }
  .opt .olabel { font-size: 12.5px; font-weight: 600; color: #e7e7ea; line-height: 1.3; }
  .opt .odesc { font-size: 11.5px; color: #8a8a92; line-height: 1.4; margin-top: 2px; }
  .opt .num .key { font-size: 8px; color: #88a; margin-right: 1px; }

  /* карточка смены режима: компактная, по центру, с «поп»-анимацией */
  .card.mode { padding: 13px 18px; transition: opacity 180ms ease; }
  .card.mode .crow { justify-content: center; }
  .card.mode .title { flex: 0 1 auto; text-align: center; font-size: 15px; }
  .card.mode.in { animation: modePop 360ms cubic-bezier(0.21, 1.3, 0.4, 1) both; }
  @keyframes modePop {
    0%   { opacity: 0; transform: translateY(8px) scale(0.86); }
    55%  { opacity: 1; transform: translateY(0) scale(1.06); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (prefers-reduced-motion: reduce) { .card, .card.mode.in { transition: none; animation: none; } }
</style>
</head>
<body>
  <div class="stack" id="stack"></div>
  <script src="./toast-bridge.js"></script>
  <script src="./toast.js"></script>
</body>
</html>

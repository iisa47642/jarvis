<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'" />
<title>Jarvis</title>
<style>
  :root {
    /* тонировка поверх нативного вибранси-блюра (vibrancy в main.js) */
    --bg: rgba(10, 10, 12, 0.62);
    --border: rgba(255, 255, 255, 0.08);
    --hairline: rgba(255, 255, 255, 0.06);
    --row-hover: rgba(255, 255, 255, 0.07);
    --text: #e7e7ea;
    --muted: #76767e;
    --faint: #55555c;
    --keycap-text: #b9b9bf;
    --keycap-bg: rgba(255, 255, 255, 0.07);
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;

    --working: #6ca0ff;
    --waiting: #f2a33c;
    --done: #41c98e;
    --idle: #55555c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* атрибут hidden должен побеждать display из классов (.list { display:flex } и т.п.) */
  [hidden] { display: none !important; }

  html, body { background: transparent; height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    font-size: 13px;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    user-select: none;
    overflow: hidden;
  }

  .panel {
    position: relative; /* якорь для парящего футера и меню действий */
    height: 100%;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px; /* под системное скругление окна (roundedCorners) */
    overflow: hidden;
    transition: opacity 120ms ease-out, transform 120ms ease-out;
  }
  .panel.entering { opacity: 0; transform: scale(0.98); }
  @media (prefers-reduced-motion: reduce) {
    .panel { transition: none; }
  }

  /* ---------- command row ---------- */
  .cmdrow {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 52px;
    padding: 0 16px;
    border-bottom: 1px solid var(--hairline);
    flex: none;
  }
  .cmdrow svg { flex: none; color: var(--muted); }
  .cmdrow input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    padding: 0;
  }
  .cmdrow input::placeholder { color: var(--muted); }
  .daemon-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--done);
    flex: none;
  }

  /* ---------- tabs row ---------- */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--hairline);
    flex: none;
  }
  .tab {
    display: flex;
    align-items: center;
    padding: 4px 11px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: default;
    user-select: none;
    color: var(--muted);
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: rgba(255, 255, 255, 0.08); color: var(--text); }
  .tab.icon { padding: 4px 8px; }
  .tabkey {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--faint);
    margin-left: 3px;
  }
  .tab.active .tabkey { color: var(--muted); }
  .tabs .spacer { flex: 1; }

  /* ---------- лимит-баннер (уровень провайдера, не сессии) ---------- */
  .limitbanner {
    flex: none;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 16px;
    border-bottom: 1px solid rgba(139, 126, 200, 0.25);
    background: rgba(139, 126, 200, 0.09);
    font-size: 12px;
    color: #b9b0e2;
    font-variant-numeric: tabular-nums;
  }
  .limitbanner::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #8b7ec8;
    flex: none;
  }

  /* ---------- content ---------- */
  .content { flex: 1; overflow-y: auto; min-height: 0; }
  .content::-webkit-scrollbar { width: 0; }

  /* ---------- sessions ---------- */
  /* нижний отступ — чтобы последние строки выезжали из-под парящего футера */
  .list { padding: 8px 10px 68px; display: flex; flex-direction: column; gap: 2px; }

  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 42px;
    padding: 0 14px;
    border-radius: 8px;
    cursor: default;
    flex: none;
  }
  .row.selected { background: var(--row-hover); }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex: none;
    background: var(--idle);
  }
  .row.working .dot { background: var(--working); animation: jPulse 2.2s ease-in-out infinite; }
  .row.waiting .dot { background: var(--waiting); }
  .row.done    .dot { background: var(--done); }
  .row.limit   .dot { background: #8b7ec8; } /* лимит: не янтарь — ты не нужен, нужно время */

  @keyframes jPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.8); }
  }
  @media (prefers-reduced-motion: reduce) {
    .row.working .dot { animation: none; }
  }

  .name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    flex: none;
    max-width: 180px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badge {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 4px;
    padding: 1.5px 5px;
    flex: none;
  }

  .badge.host { color: var(--faint); border-color: rgba(255, 255, 255, 0.06); }

  .gitbranch {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--muted);
    flex: none;
    max-width: 140px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .pin {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--working);
    display: flex;
    align-items: center;
    padding: 2px 3px;
    border-radius: 5px;
    cursor: default;
    flex: none;
  }
  .pin svg { fill: currentColor; opacity: 0.9; }
  .pin:hover { opacity: 1; background: var(--row-hover); }

  .summary {
    font-size: 12.5px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--faint);
    font-variant-numeric: tabular-nums;
    flex: none;
  }

  /* ---------- empty states ---------- */
  .empty {
    padding: 48px 24px;
    text-align: center;
    font-size: 12.5px;
    color: var(--faint);
    line-height: 1.6;
  }

  /* ---------- история чатов ---------- */
  .history { padding: 8px 10px 70px; overflow-y: auto; }
  .history::-webkit-scrollbar { width: 0; }
  .hgroup {
    font-size: 10.5px; letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--faint); font-weight: 600; padding: 12px 6px 5px;
    display: flex; align-items: baseline; gap: 8px;
  }
  .hgroup .hcount { color: rgba(255,255,255,0.2); letter-spacing: 0; text-transform: none; }
  .hrow {
    display: flex; align-items: center; gap: 11px;
    height: 40px; padding: 0 12px; border-radius: 8px; cursor: default;
  }
  .hrow.selected { background: var(--row-hover); }
  .hrow .htitle {
    font-size: 12.5px; color: var(--text); flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .hrow .hmeta {
    font-family: var(--mono); font-size: 10.5px; color: var(--faint);
    flex: none; font-variant-numeric: tabular-nums;
  }
  .hrow .hcopy {
    font-size: 10.5px; color: var(--working); flex: none; visibility: hidden;
  }
  .hrow.selected .hcopy, .hrow:hover .hcopy { visibility: visible; }
  .hhint { font-size: 10.5px; color: var(--faint); padding: 4px 8px 8px; }
  .hrow .hchev { font-size: 13px; color: var(--faint); flex: none; }
  /* хлебная крошка «‹ Проекты» внутри проекта */
  .hgroup .hback { letter-spacing: 0; text-transform: none; font-weight: 500; color: var(--muted); }
  .hgroup .hback:hover { color: var(--text); }

  /* ---------- статистика usage ---------- */
  .stats { padding: 16px 22px 70px; overflow-y: auto; }
  .stats::-webkit-scrollbar { width: 0; }

  .uctl { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .uctl .uhint { margin-left: auto; font-size: 10.5px; color: var(--faint); }

  .ubig { margin-bottom: 12px; }
  .ubig-row { display: flex; gap: 56px; margin-bottom: 14px; }
  .ubig .ulabel {
    font-size: 10.5px; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--faint); font-weight: 600; margin-bottom: 3px;
  }
  .ubig .uval {
    font-family: var(--mono); font-size: 25px; font-weight: 600;
    color: var(--text); font-variant-numeric: tabular-nums; line-height: 1.1;
  }
  .ubig .umoney { font-size: 11.5px; color: var(--muted); margin-top: 3px; font-variant-numeric: tabular-nums; }
  .ubig .umoney .api { color: var(--done); }

  /* лимиты подписки: прогресс-бары */
  .ulim { display: flex; align-items: center; gap: 12px; height: 28px; }
  .ulim-label { font-size: 12px; color: var(--text); width: 64px; flex: none; }
  .ulim-track { flex: 1; height: 4px; border-radius: 2px; background: rgba(255, 255, 255, 0.06); overflow: hidden; }
  .ulim-fill { height: 4px; border-radius: 2px; background: rgba(255, 255, 255, 0.38); }
  .ulim-fill.warn { background: var(--waiting); }
  .ulim-fill.crit { background: #e5484d; }
  .ulim-pct {
    font-family: var(--mono); font-size: 12px; color: var(--text);
    font-variant-numeric: tabular-nums; width: 40px; text-align: right; flex: none;
  }
  .ulim-reset { font-size: 11px; color: var(--muted); width: 210px; flex: none; text-align: right; font-variant-numeric: tabular-nums; }

  .uwindow {
    display: flex; align-items: baseline; gap: 8px;
    font-size: 12px; color: var(--muted); margin-bottom: 16px;
    font-variant-numeric: tabular-nums;
  }
  .uwindow .uwtok { font-family: var(--mono); color: var(--text); }

  .usect {
    font-size: 10.5px; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--faint); font-weight: 600; margin: 14px 0 6px;
    display: flex; align-items: baseline;
  }
  .usect .uhover { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--muted); text-transform: none; letter-spacing: 0; }

  .uchart { display: flex; align-items: flex-end; gap: 3px; height: 52px; }
  .uchart .ubar-wrap { flex: 1; height: 100%; display: flex; align-items: flex-end; cursor: default; }
  .uchart .ubar { width: 100%; border-radius: 2px 2px 1px 1px; background: rgba(255, 255, 255, 0.28); min-height: 2px; }
  .uchart .ubar-wrap:hover .ubar { background: rgba(255, 255, 255, 0.6); }

  .urow { display: flex; align-items: center; gap: 12px; height: 26px; }
  .urow .uname {
    font-size: 12.5px; color: var(--text); width: 150px; flex: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .urow .ubartrack { flex: 1; height: 3px; border-radius: 1.5px; background: rgba(255, 255, 255, 0.05); }
  .urow .ubarfill { height: 3px; border-radius: 1.5px; background: rgba(255, 255, 255, 0.32); }
  .urow .unum {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    font-variant-numeric: tabular-nums; width: 60px; text-align: right; flex: none;
  }
  .urow .unum.money { width: 76px; }
  .urow .unum.money.api { color: var(--done); }

  /* ---------- settings ---------- */
  .settings { padding: 16px 22px 68px; }
  .settings .stitle {
    font-size: 10.5px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--faint);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .settings .stitle.sub { margin-top: 20px; }
  .srow.sub { padding-left: 18px; }
  .srow .sval { font-size: 12.5px; color: var(--faint); }
  .srow .sval.on { color: var(--done); }
  .srow {
    display: flex;
    align-items: center;
    gap: 10px;
    height: 46px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }
  .srow:last-child { border-bottom: none; }
  .slabel { font-size: 13px; color: var(--text); }
  .shint { font-size: 10.5px; color: var(--faint); margin-left: 6px; }
  .srow .spacer { flex: 1; }
  .serror { padding: 8px 0 2px; font-size: 11px; color: var(--waiting); }

  .toggle {
    appearance: none;
    width: 30px;
    height: 18px;
    border-radius: 9px;
    background: rgba(255, 255, 255, 0.12);
    position: relative;
    outline: none;
    transition: background 120ms ease;
    flex: none;
  }
  .toggle:checked { background: rgba(108, 160, 255, 0.85); }
  .toggle::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    transition: left 120ms ease;
  }
  .toggle:checked::after { left: 14px; }

  .keycap {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--keycap-text);
    background: var(--keycap-bg);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 4px;
    padding: 2px 6px;
    font-variant-numeric: tabular-nums;
  }
  button.keycap { appearance: none; cursor: default; }
  button.keycap.recording { border-color: var(--working); color: var(--working); }

  .seg {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .segbtn {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 11px;
    padding: 3px 10px;
    cursor: default;
  }
  .segbtn.active { background: rgba(255, 255, 255, 0.1); color: var(--text); }

  /* ---------- chat ---------- */
  .chat { height: 100%; display: flex; flex-direction: column; }
  .chathead {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 38px;
    padding: 0 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    flex: none;
  }
  .chathead .back {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--muted);
    display: flex;
    align-items: center;
    padding: 4px;
    border-radius: 6px;
    cursor: default;
  }
  .chathead .back:hover { background: var(--row-hover); color: var(--text); }
  .chattitle { font-size: 12px; font-weight: 500; color: var(--text); }
  .chatsub {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  /* ---------- экран вопроса (AskUserQuestion), только клавиатура ---------- */
  .qview { height: 100%; display: flex; flex-direction: column; }
  .qvhead {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 12px 16px 10px;
    flex: none;
  }
  .qvhead .back {
    appearance: none; border: 0; background: transparent; color: var(--muted);
    display: flex; align-items: center; padding: 4px; border-radius: 6px; cursor: default;
  }
  .qvhead .back:hover { background: var(--row-hover); color: var(--text); }
  .qvtitle { font-size: 14px; font-weight: 600; color: var(--text); }

  .qvopts {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 2px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .qvopts::-webkit-scrollbar { width: 0; }

  .qopt {
    display: flex;
    align-items: flex-start;
    gap: 11px;
    padding: 11px 13px;
    border-radius: 10px;
    border: 1px solid transparent;
    cursor: default;
  }
  .qopt.sel {
    background: rgba(108, 160, 255, 0.1);
    border-color: rgba(108, 160, 255, 0.35);
  }
  .qopt.chosen { box-shadow: inset 2px 0 0 0 var(--waiting); }
  .qnum {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--keycap-text);
    background: var(--keycap-bg);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 5px;
    padding: 2px 7px;
    flex: none;
    margin-top: 1px;
  }
  .qopt.sel .qnum { color: var(--working); border-color: rgba(108, 160, 255, 0.4); }
  .qopt.chosen .qnum { color: var(--waiting); }
  .qbody { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .qlabel { font-size: 13.5px; font-weight: 500; color: var(--text); }
  .qdesc { font-size: 11.5px; color: var(--muted); line-height: 1.4; }
  .qcheck { margin-left: auto; align-self: center; color: var(--waiting); font-size: 13px; flex: none; }

  .qvfoot {
    flex: none;
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    padding: 9px 16px;
    border-top: 1px solid var(--hairline);
    font-size: 11px;
    color: var(--muted);
  }
  .qvfoot .keycap { font-size: 10px; padding: 1.5px 5px; margin-right: 5px; }

  .chatlog {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    user-select: text;
  }
  .chatlog::-webkit-scrollbar { width: 0; }

  .msg { display: flex; max-width: 100%; }
  .msg .bubble {
    font-size: 12.5px;
    line-height: 1.5;
    word-break: break-word;
    max-width: 82%;
  }
  .msg.user { justify-content: flex-end; }
  .msg.user .bubble {
    background: rgba(108, 160, 255, 0.13);
    border: 1px solid rgba(108, 160, 255, 0.1);
    border-radius: 10px;
    padding: 7px 11px;
    color: var(--text);
    white-space: pre-wrap;
    max-width: 78%;
  }
  .msg.assistant .bubble { color: var(--text); }

  /* маркдаун ассистента */
  .bubble p { margin: 0 0 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble .md-h { font-weight: 600; }
  .bubble ul { margin: 0 0 8px; padding-left: 16px; }
  .bubble ul:last-child { margin-bottom: 0; }
  .bubble li { margin: 2px 0; }
  .bubble code {
    font-family: var(--mono);
    font-size: 11px;
    background: rgba(255, 255, 255, 0.07);
    border-radius: 4px;
    padding: 1px 4px;
  }
  .bubble pre {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.45;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    padding: 8px 10px;
    margin: 0 0 8px;
    overflow: auto;
    max-height: 180px;
    white-space: pre;
  }
  .bubble pre:last-child { margin-bottom: 0; }

  /* callout-карточка (★ Insight и подобные блоки) */
  .callout {
    border: 1px solid rgba(108, 160, 255, 0.16);
    border-left: 2px solid var(--working);
    background: rgba(108, 160, 255, 0.06);
    border-radius: 8px;
    padding: 8px 12px;
    margin: 8px 0;
  }
  .callout:last-child { margin-bottom: 0; }
  .callout-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--working);
    margin-bottom: 6px;
  }
  .callout p:last-child, .callout ul:last-child { margin-bottom: 0; }

  .md-hr {
    height: 1px;
    background: var(--hairline);
    margin: 10px 0;
  }

  /* группа тул-вызовов: компактные чипы в строку */
  .msg.tools {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 1px 0;
  }
  .msg.tools .chip {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.03);
    border-radius: 5px;
    padding: 2.5px 7px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 260px;
    flex: none;
  }
  .chatempty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--faint);
    text-align: center;
    padding: 0 40px;
    line-height: 1.6;
  }

  .chatinput {
    display: flex;
    align-items: center;
    gap: 9px;
    height: 44px;
    padding: 0 16px;
    border-top: 1px solid var(--hairline);
    flex: none;
    color: var(--faint);
  }
  .chatinput input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
  }
  .chatinput input::placeholder { color: var(--faint); }

  /* ---------- индикатор «думает / генерирует» ---------- */
  .chatstatus {
    flex: none;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 16px;
    border-top: 1px solid var(--hairline);
    font-size: 11.5px;
    color: var(--muted);
  }
  .chatstatus::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--working);
    flex: none;
    animation: jPulse 1.4s ease-in-out infinite;
  }
  .chatstatus.waiting { color: var(--waiting); }
  .chatstatus.waiting::before { background: var(--waiting); animation: none; }
  .chatstatus .dots::after {
    content: "";
    animation: jDots 1.4s steps(4, end) infinite;
  }
  @keyframes jDots { 0% { content: ""; } 25% { content: "·"; } 50% { content: "··"; } 75% { content: "···"; } }
  @media (prefers-reduced-motion: reduce) {
    .chatstatus::before { animation: none; }
    .chatstatus .dots::after { animation: none; content: "…"; }
  }

  /* инструкция для сессий вне tmux */
  .tmuxhint {
    flex: none;
    padding: 10px 14px;
    border-top: 1px solid var(--hairline);
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.5;
  }
  .tmuxcmd {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    background: var(--keycap-bg);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 5px;
    padding: 2px 6px;
    cursor: default;
    white-space: nowrap;
  }
  .tmuxcmd:hover { border-color: rgba(108, 160, 255, 0.4); color: var(--working); }

  /* ---------- палитра команд (/ в поле ответа) ---------- */
  .cmdpalette {
    flex: none;
    max-height: 240px;
    overflow-y: auto;
    border-top: 1px solid var(--hairline);
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .cmdpalette::-webkit-scrollbar { width: 0; }
  .cmdrow-item {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 6px 10px;
    border-radius: 7px;
    cursor: default;
  }
  .cmdrow-item.sel { background: rgba(108, 160, 255, 0.1); }
  .cmdname {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    flex: none;
  }
  .cmdrow-item.sel .cmdname { color: var(--working); }
  .cmdhint {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--faint);
    white-space: nowrap;
    flex: none;
  }
  .cmddesc {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    text-align: right;
  }
  .cmdsrc {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--faint);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 4px;
    padding: 1px 4px;
    flex: none;
  }

  /* ---------- toast ---------- */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 48px;
    transform: translateX(-50%);
    padding: 7px 14px;
    border-radius: 8px;
    background: rgba(28, 28, 32, 0.97);
    border: 1px solid var(--border);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    font-size: 12px;
    color: var(--text);
    animation: jToast 140ms ease-out;
    pointer-events: none;
    max-width: 80%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @keyframes jToast {
    from { opacity: 0; transform: translate(-50%, 6px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ---------- footer: liquid glass остров (Raycast v2) ---------- */
  footer {
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 10px;
    height: 46px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 6px 0 16px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.055);
    border: 1px solid rgba(255, 255, 255, 0.09);
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    box-shadow: 0 10px 28px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    font-size: 11.5px;
    color: var(--muted);
    z-index: 5;
  }
  footer .daemon-dot { width: 6px; height: 6px; }
  footer .spacer { flex: 1; }

  .factions { display: flex; align-items: center; gap: 4px; height: 100%; padding: 5px 0; }
  .fdivider { width: 1px; align-self: stretch; margin: 9px 2px; background: rgba(255, 255, 255, 0.1); }

  .hint {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 9px;
    border-radius: 9px;
    cursor: default;
  }
  .hint .keycap { font-size: 10px; padding: 2px 6px; }
  .hint.primary { color: var(--text); font-weight: 500; }
  .hint.primary:hover, .hint.clickable:hover { background: rgba(255, 255, 255, 0.07); color: var(--text); }

  /* всплывающее меню действий (⌘K) */
  .actions-pop {
    position: absolute;
    right: 10px;
    bottom: 62px;
    min-width: 240px;
    padding: 6px;
    border-radius: 12px;
    background: rgba(24, 24, 28, 0.92);
    border: 1px solid var(--border);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.55);
    z-index: 6;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .ap-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 12.5px;
    color: var(--text);
    cursor: default;
  }
  .ap-item.sel { background: rgba(108, 160, 255, 0.12); }
  .ap-item .spacer { flex: 1; }
  .ap-item .keycap { font-size: 10px; padding: 1.5px 6px; }
</style>
</head>
<body>
  <div class="panel entering" id="panel">
    <div class="cmdrow">
      <!-- lucide: search -->
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="query" placeholder="Найти чат…" spellcheck="false" autocomplete="off" />
      <span class="daemon-dot" title="демон активен"></span>
    </div>

    <div class="tabs">
      <div class="tab active" id="tabSessions">Чаты <span class="tabkey">⌘1</span></div>
      <div class="tab" id="tabHistory">Проекты <span class="tabkey">⌘2</span></div>
      <div class="tab" id="tabStats">Статистика <span class="tabkey">⌘3</span></div>
      <span class="spacer"></span>
      <div class="tab icon" id="tabSettings" title="Настройки · ⌘,">
        <!-- lucide: sliders-horizontal -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
      </div>
    </div>

    <div class="limitbanner" id="limitBanner" hidden></div>
    <div class="content">
      <div class="list" id="list"></div>
      <div class="chat" id="chat" hidden>
        <div class="chathead">
          <button class="back" id="chatBack" title="Назад · Esc">
            <!-- lucide: arrow-left -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          </button>
          <span class="chattitle" id="chatTitle"></span>
          <span class="chatsub" id="chatSub"></span>
          <span class="badge host" id="chatChannel" hidden>вне терминала</span>
        </div>
        <div class="chatlog" id="chatlog"></div>
        <div class="chatstatus" id="chatStatus" hidden></div>
        <div class="tmuxhint" id="tmuxHint" hidden></div>
        <div class="cmdpalette" id="cmdPalette" hidden></div>
        <div class="chatinput">
          <!-- lucide: corner-down-left -->
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 10 4 15 9 20"/><path d="M20 4v7a4 4 0 0 1-4 4H4"/></svg>
          <input id="reply" placeholder="Ответить агенту…" spellcheck="false" autocomplete="off" />
        </div>
      </div>
      <div class="qview" id="qview" hidden>
        <div class="qvhead">
          <button class="back" id="qBack" title="Назад · Esc">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
          </button>
          <span class="badge" id="qHeader" hidden></span>
          <span class="qvtitle" id="qTitle"></span>
        </div>
        <div class="qvopts" id="qOpts"></div>
        <div class="qvfoot" id="qFoot"></div>
      </div>
      <div class="stats" id="stats" hidden></div>
      <div class="history" id="history" hidden></div>
      <div class="settings" id="settings" hidden>
        <div class="stitle">Настройки</div>
        <div class="srow">
          <span class="slabel">Глобальный хоткей</span>
          <span class="spacer"></span>
          <button class="keycap" id="hotkey">⌘ J</button>
        </div>
        <div class="serror" id="hotkeyError" hidden></div>
        <div class="srow">
          <span class="slabel">Уведомлять: закончил ответ</span>
          <span class="spacer"></span>
          <input type="checkbox" id="notifyDone" class="toggle">
        </div>
        <div class="srow">
          <span class="slabel">Уведомлять: ждёт тебя</span>
          <span class="spacer"></span>
          <input type="checkbox" id="notifyWaiting" class="toggle">
        </div>
        <div class="srow">
          <span class="slabel">Продолжать сессии после лимита <span class="shint">авто-«продолжай» при сбросе</span></span>
          <span class="spacer"></span>
          <input type="checkbox" id="autoResume" class="toggle">
        </div>
        <div class="srow">
          <span class="slabel">Позиция панели</span>
          <span class="spacer"></span>
          <div class="seg" id="position">
            <button data-v="center" class="segbtn">Центр</button>
            <button data-v="corner" class="segbtn">Угол</button>
          </div>
        </div>
        <div class="srow">
          <span class="slabel">Запускать при входе</span>
          <span class="spacer"></span>
          <input type="checkbox" id="openAtLogin" class="toggle">
        </div>
        <div class="stitle sub">Плагины</div>
        <div id="pluginRows"></div>
      </div>
    </div>

    <footer id="footer">
      <span class="daemon-dot" title="демон активен"></span>
      <span id="footerLeft">демон активен</span>
      <span class="spacer"></span>
      <div class="factions">
        <div class="hint primary" id="primaryHint">
          <span id="primaryLabel">Открыть чат</span><span class="keycap" id="primaryKey">↵</span>
        </div>
        <div class="fdivider"></div>
        <div class="hint clickable" id="actionsBtn">
          <span>Действия</span><span class="keycap">⌘K</span>
        </div>
      </div>
    </footer>
    <div class="actions-pop" id="actionsPop" hidden></div>
  </div>
  <script src="./renderer.js"></script>
</body>
</html>

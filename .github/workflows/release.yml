name: release

on:
  push:
    tags:
      - "v*"

jobs:
  macos:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (aarch64 — Apple Silicon)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cargo cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      # whisper.cpp (whisper-rs, фича whisper-native) собирается через CMake.
      - name: Ensure cmake (whisper-native)
        run: cmake --version || brew install cmake

      - name: Build (ad-hoc sign), updater artifacts, release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc подпись (signingIdentity "-" в tauri.conf) — без Apple Developer.
          # Apple-сертификата у проекта нет; Gatekeeper предупредит один раз.
          # Обновления подписываются ключом Tauri (независимо от Apple).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target aarch64-apple-darwin --features wakeword-ort,whisper-native,stt-vad
          tagName: ${{ github.ref_name }}
          releaseName: Jarvis ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
